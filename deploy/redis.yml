apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ${namespace}
spec:
  minReadySeconds: 10
  selector:
    matchLabels:
      app: redis
  replicas: 1
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: zziaguan/redis:7.4.1-cli
          command:
            - redis-server
            - "/etc/redis/redis.conf"
          volumeMounts:
            - mountPath: /etc/redis/redis.conf
              name: config
              subPath: redis.cnf
      volumes:
        - name: config
          configMap:
            name: redis-config
---
# configmap
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: ${namespace}
data:
  redis.cnf: |
    requirepass 123456Aa@666
    bind 0.0.0.0
    appendonly yes
    timeout 30
    tcp-keepalive 200
    maxclients 10000
---
#service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ${namespace}
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      protocol: TCP
      targetPort: 6379
