    dateFormat: yyyy-MM-dd HH:mm:ss # 对返回的时间格式化
    timeZone: GMT+8 # 时区设置
    defaultPropertyInclusion: non_null
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB
  application:
    name: template-app
  profiles:
    active: local
  datasource:
    url: jdbc:h2:file:/Users/guanweiming/IdeaProjects/mqtt-demo/h2/sign;AUTO_SERVER=TRUE;AUTO_RECONNECT=TRUE;MODE=MySQL
    username: root
    password: root
    driverClassName: org.h2.Driver
  jpa:
