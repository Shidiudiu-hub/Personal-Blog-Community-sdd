# Modbus配置
modbus:
  enabled: true           # 是否启用Modbus
  protocol: TCP           # 协议类型: TCP, RTU, ASCII
  host: 10.0.0.1          # Modbus主机地址
  port: 502               # Modbus TCP端口
  slave-id: 1             # 从站ID
  timeout: 3000           # 连接超时时间（毫秒）
  retries: 3              # 重试次数
  # RTU模式配置（使用RTU协议时需要配置）
  # serial-port: /dev/ttyUSB0  # 串口名称
  # baud-rate: 9600            # 波特率
  # data-bits: 8               # 数据位
  # stop-bits: 1               # 停止位
  # parity: NONE               # 校验位: NONE, ODD, EVEN